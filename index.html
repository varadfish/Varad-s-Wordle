<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#121213;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px 0;overflow-x:hidden}

#game-screen{display:flex;flex-direction:column;align-items:center;width:100%;transition:opacity 0.4s}
#end-screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:90vh;text-align:center;padding:24px;transition:opacity 0.4s;opacity:0}
#end-screen.show{display:flex}
#end-screen.visible{opacity:1}

#header{width:100%;max-width:420px;text-align:center;border-bottom:1px solid #3a3a3c;padding-bottom:14px;margin-bottom:14px}
#logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.logo-tiles{display:flex;gap:3px}
.logo-tile{width:18px;height:18px;border-radius:2px}
.lt-g{background:#538d4e}.lt-y{background:#b59f3b}.lt-x{background:#3a3a3c}
#title-text{font-size:22px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#fff}
#subtitle{font-size:11px;letter-spacing:2px;color:#818384;text-transform:uppercase;font-weight:400}

#msg{height:28px;font-size:13px;font-weight:500;color:#fff;background:#fff2;border-radius:4px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;width:100%;max-width:420px;opacity:0;transition:opacity 0.2s}
#msg.show{opacity:1}

#board{display:flex;flex-direction:column;gap:5px;margin-bottom:18px}
.row{display:flex;gap:5px}
.tile{width:56px;height:56px;border:2px solid #3a3a3c;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;text-transform:uppercase;user-select:none;border-radius:3px;color:#fff;background:#121213;transition:border-color 0.05s}
.tile.filled{border-color:#565758;animation:pop 0.1s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.tile.correct{background:#538d4e;border-color:#538d4e}
.tile.present{background:#b59f3b;border-color:#b59f3b}
.tile.absent{background:#3a3a3c;border-color:#3a3a3c}
.tile.shake{animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

#keyboard{display:flex;flex-direction:column;gap:6px;align-items:center}
.kb-row{display:flex;gap:5px}
.key{height:52px;min-width:36px;padding:0 6px;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;text-transform:uppercase;background:#818384;color:#fff;transition:background 0.15s;letter-spacing:0.5px}
.key.wide{min-width:54px;font-size:11px}
.key:active{opacity:0.75}
.key.correct{background:#538d4e}
.key.present{background:#b59f3b}
.key.absent{background:#3a3a3c}

#end-label{font-size:36px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
#end-sub{font-size:15px;color:#818384;margin-bottom:6px}
#end-word{font-size:48px;font-weight:800;letter-spacing:6px;text-transform:uppercase;margin-bottom:8px;color:#fff}
#end-msg{font-size:16px;color:#818384;margin-bottom:20px}
#end-img{width:220px;height:220px;object-fit:cover;border-radius:12px;margin-bottom:24px;border:2px solid #3a3a3c}
#end-btn{padding:12px 36px;font-size:14px;font-weight:600;border-radius:4px;border:2px solid #fff;background:transparent;color:#fff;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:background 0.15s,color 0.15s}
#end-btn:hover{background:#fff;color:#121213}

canvas#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;display:none}
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div id="game-screen">
  <div id="header">
    <div id="logo">
      <div class="logo-tiles">
        <div class="logo-tile lt-g"></div><div class="logo-tile lt-y"></div>
        <div class="logo-tile lt-x"></div><div class="logo-tile lt-g"></div>
        <div class="logo-tile lt-y"></div>
      </div>
      <div id="title-text">Varad's Wordle</div>
      <div class="logo-tiles">
        <div class="logo-tile lt-y"></div><div class="logo-tile lt-x"></div>
        <div class="logo-tile lt-g"></div><div class="logo-tile lt-x"></div>
        <div class="logo-tile lt-g"></div>
      </div>
    </div>
    <div id="subtitle">a word guessing game</div>
  </div>
  <div id="msg"></div>
  <div id="board"></div>
  <div id="keyboard"></div>
</div>

</div>

}

function buildBoard(){
  const b=document.getElementById('board');b.innerHTML='';
  for(let r=0;r<6;r++){
    const row=document.createElement('div');row.className='row';row.id='row-'+r;
    for(let c=0;c<5;c++){
      const t=document.createElement('div');t.className='tile';t.id=`t-${r}-${c}`;
      row.appendChild(t);
    }
    b.appendChild(row);
  }
}

function buildKeyboard(){
  const kb=document.getElementById('keyboard');kb.innerHTML='';
  [['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['Enter','z','x','c','v','b','n','m','⌫']].forEach(keys=>{
    const row=document.createElement('div');row.className='kb-row';
    keys.forEach(k=>{
      const btn=document.createElement('button');
      btn.className='key'+(k==='Enter'||k==='⌫'?' wide':'');
      btn.id='key-'+k;btn.textContent=k;
      btn.addEventListener('click',()=>handleKey(k));
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });
}

function handleKey(k){
  if(gameOver)return;
  const row=guesses.length;
  if(k==='⌫'||k==='Backspace'){
    if(current.length>0){current=current.slice(0,-1);updateRow(row);}
  } else if(k==='Enter'){
    if(current.length<5){shakRow(row);return;}
    if(!WORDS.includes(current)){setMsg('Not in word list');shakRow(row);return;}
    submitGuess();
  } else if(/^[a-zA-Z]$/.test(k)&&current.length<5){
    current+=k.toLowerCase();updateRow(row);
  }
}

function updateRow(row){
  for(let c=0;c<5;c++){
    const t=document.getElementById(`t-${row}-${c}`);
    t.textContent=current[c]||'';
    t.className='tile'+(current[c]?' filled':'');
  }
}

function shakRow(row){
  document.getElementById('row-'+row).querySelectorAll('.tile').forEach(t=>{
    t.classList.add('shake');t.addEventListener('animationend',()=>t.classList.remove('shake'),{once:true});
  });
}

function setMsg(m){
  const el=document.getElementById('msg');
  el.textContent=m;el.classList.toggle('show',!!m);
  clearTimeout(el._t);
  if(m)el._t=setTimeout(()=>{el.textContent='';el.classList.remove('show');},1800);
}

function submitGuess(){
  const row=guesses.length;const g=current;guesses.push(g);current='';
  const result=score(g);
  flipTiles(row,g,result,()=>{
    updateKeys(g,result);
    if(result.every(r=>r==='correct')){
      gameOver=true;
      setTimeout(()=>showEndScreen(true),500);
    } else if(guesses.length===6){
      gameOver=true;
      setTimeout(()=>showEndScreen(false),500);
    }
  });
}

function score(g){
  const res=Array(5).fill('absent');const tArr=[...target];const gArr=[...g];
  const used=Array(5).fill(false);
  for(let i=0;i<5;i++){if(gArr[i]===tArr[i]){res[i]='correct';used[i]=true;gArr[i]=null;}}
  for(let i=0;i<5;i++){
    if(gArr[i]===null)continue;
    const j=tArr.findIndex((c,idx)=>!used[idx]&&c===gArr[i]);
    if(j!==-1){res[i]='present';used[j]=true;}
  }
  return res;
}

function flipTiles(row,g,result,cb){
  for(let c=0;c<5;c++){
    const t=document.getElementById(`t-${row}-${c}`);
    const delay=c*280;
    setTimeout(()=>{t.style.transition='transform 0.22s ease';t.style.transform='rotateX(-90deg)';},delay);
    setTimeout(()=>{t.textContent=g[c];t.className='tile '+result[c];t.style.transform='rotateX(0deg)';},delay+220);
  }
  setTimeout(cb,5*280+100);
}

function updateKeys(g,result){
  const p={correct:3,present:2,absent:1};
  for(let i=0;i<5;i++){
    const btn=document.getElementById('key-'+g[i]);if(!btn)continue;
    const cur=btn.className.includes('correct')?3:btn.className.includes('present')?2:btn.className.includes('absent')?1:0;
    if(p[result[i]]>cur)btn.className='key '+result[i];
  }
}

function showEndScreen(won){
  const gs=document.getElementById('game-screen');
  const es=document.getElementById('end-screen');
  const label=document.getElementById('end-label');
  const sub=document.getElementById('end-sub');
  const word=document.getElementById('end-word');
  const msg=document.getElementById('end-msg');
  const img=document.getElementById('end-img');
  const btn=document.getElementById('end-btn');

  gs.style.opacity='0';
  gs.style.pointerEvents='none';

  setTimeout(()=>{
    gs.style.display='none';
    if(won){
      const n=guesses.length;
      label.textContent=n<=2?'Genius!':n<=4?'Great!':'Phew!';
      label.style.color='#538d4e';
      sub.textContent=`Got it in ${n}/6!`;
      word.style.display='none';
      msg.style.display='none';
      img.src=WIN_IMG;
      btn.textContent='Play Again';
      startConfetti();
    } else {
      label.textContent='Game Over';
      label.style.color='#e53935';
      sub.textContent='The word was';
      word.textContent=target.toUpperCase();
      word.style.display='block';
      msg.textContent='Better luck next time, DUMBASS';
      msg.style.display='block';
      img.src=LOSE_IMG;
      btn.textContent='Try Again';
    }
    es.classList.add('show');
    requestAnimationFrame(()=>requestAnimationFrame(()=>es.classList.add('visible')));
  },400);
}

function hideEndScreen(){
  const gs=document.getElementById('game-screen');
  const es=document.getElementById('end-screen');
  es.classList.remove('visible');
  setTimeout(()=>{
    es.classList.remove('show');
    gs.style.display='flex';
    gs.style.opacity='1';
    gs.style.pointerEvents='auto';
  },400);
}

// Confetti
let confettiAnim;
const COLORS=['#538d4e','#b59f3b','#ffffff','#e53935','#1e88e5','#fb8c00'];
function startConfetti(){
  const canvas=document.getElementById('confetti');
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:140},()=>({
    x:Math.random()*canvas.width,y:Math.random()*-canvas.height,
    w:8+Math.random()*8,h:14+Math.random()*8,
    color:COLORS[Math.floor(Math.random()*COLORS.length)],
    rot:Math.random()*360,rotS:(Math.random()-0.5)*6,
    vx:(Math.random()-0.5)*3,vy:3+Math.random()*4
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotS;
      if(p.y>canvas.height){p.y=-20;p.x=Math.random()*canvas.width;}
    });
    confettiAnim=requestAnimationFrame(draw);
  }
  draw();
  setTimeout(stopConfetti,4000);
}
function stopConfetti(){
  cancelAnimationFrame(confettiAnim);
  const canvas=document.getElementById('confetti');
  canvas.style.display='none';
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==='Enter')handleKey('Enter');
  else if(e.key==='Backspace')handleKey('Backspace');
  else if(/^[a-zA-Z]$/.test(e.key))handleKey(e.key);
});

init();
</script>
